<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860" role="img" aria-labelledby="title desc">
  <title id="title">QuantOS Runtime Pipeline</title>
  <desc id="desc">A simplified QuantOS architecture diagram showing grouped inputs, the main runtime pipeline, grouped outputs, and extension seams.</desc>
  <defs>
    <style>
      .bg { fill: #f8fafc; }
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .section { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 17px Arial, sans-serif; fill: #0f172a; }
      .body { font: 400 14px Arial, sans-serif; fill: #334155; }
      .mono { font: 600 14px Arial, sans-serif; fill: #1e293b; }
      .box { rx: 18; ry: 18; stroke-width: 2; }
      .arrow { stroke: #334155; stroke-width: 3; fill: none; marker-end: url(#arrowHead); }
      .note { font: 600 14px Arial, sans-serif; fill: #7c2d12; }
    </style>
    <marker id="arrowHead" markerWidth="10" markerHeight="10" refX="9" refY="5" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#334155"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1400" height="860"/>

  <text class="title" x="60" y="64">QuantOS Runtime Pipeline</text>
  <text class="subtitle" x="60" y="96">Deterministic replay, explicit model and gate seams, and backtest or paper or live parity</text>

  <text class="section" x="80" y="150">Inputs</text>
  <text class="section" x="500" y="150">Core Runtime</text>
  <text class="section" x="1080" y="150">Outputs</text>

  <rect class="box" x="60" y="180" width="300" height="210" fill="#eef6ff" stroke="#60a5fa"/>
  <text class="label" x="90" y="220">Market Inputs</text>
  <text class="body" x="90" y="255">Replay data</text>
  <text class="body" x="210" y="255">parquet and csv bars</text>
  <text class="body" x="90" y="290">Live data</text>
  <text class="body" x="210" y="290">simulator and exchange adapters</text>
  <text class="body" x="90" y="325">Configuration</text>
  <text class="body" x="210" y="325">YAML app configs and registries</text>
  <text class="body" x="90" y="365">Goal</text>
  <text class="body" x="210" y="365">feed one normalized runtime path</text>

  <rect class="box" x="450" y="180" width="420" height="78" fill="#ffffff" stroke="#cbd5e1"/>
  <text class="label" x="480" y="214">1. MarketDataEngine</text>
  <text class="body" x="480" y="240">normalization, calendars, aggregation, bounded rivers</text>

  <rect class="box" x="450" y="282" width="420" height="78" fill="#f5f3ff" stroke="#a78bfa"/>
  <text class="label" x="480" y="316">2. ModelEngine</text>
  <text class="body" x="480" y="342">volatility, regime, and future custom models</text>

  <rect class="box" x="450" y="384" width="420" height="78" fill="#eef2ff" stroke="#818cf8"/>
  <text class="label" x="480" y="418">3. Strategies</text>
  <text class="body" x="480" y="444">public EMA example and public strategy template</text>

  <rect class="box" x="450" y="486" width="420" height="78" fill="#f0fdf4" stroke="#4ade80"/>
  <text class="label" x="480" y="520">4. GateEngine</text>
  <text class="body" x="480" y="546">model alignment now, richer suitability gates later</text>

  <rect class="box" x="450" y="588" width="420" height="92" fill="#fff7ed" stroke="#fb923c"/>
  <text class="label" x="480" y="622">5. Portfolio, Risk, Execution, Accounting</text>
  <text class="body" x="480" y="648">targets, approval, fills, broker simulation, equity, PnL</text>

  <rect class="box" x="1030" y="180" width="310" height="260" fill="#f8fafc" stroke="#94a3b8"/>
  <text class="label" x="1060" y="220">Run Outputs</text>
  <text class="body" x="1060" y="255">Artifacts</text>
  <text class="body" x="1165" y="255">manifest, summary, fills, trades</text>
  <text class="body" x="1060" y="290">Reporting</text>
  <text class="body" x="1165" y="290">equity curve, months, years, sessions</text>
  <text class="body" x="1060" y="325">Inspection</text>
  <text class="body" x="1165" y="325">trade charts and overlays</text>
  <text class="body" x="1060" y="360">Modes</text>
  <text class="body" x="1165" y="360">backtest, paper, live</text>
  <text class="body" x="1060" y="400">Result</text>
  <text class="body" x="1165" y="400">one consistent runtime contract</text>

  <rect class="box" x="1030" y="500" width="310" height="150" fill="#fff7ed" stroke="#fb923c"/>
  <text class="label" x="1060" y="538">Extension Seams</text>
  <text class="body" x="1060" y="572">Stronger regime engines, volatility models,</text>
  <text class="body" x="1060" y="598">structure models, and suitability gates</text>
  <text class="body" x="1060" y="624">fit the existing registry-and-engine path.</text>

  <path class="arrow" d="M 360 285 C 400 285, 410 219, 450 219"/>
  <path class="arrow" d="M 660 258 L 660 282"/>
  <path class="arrow" d="M 660 360 L 660 384"/>
  <path class="arrow" d="M 660 462 L 660 486"/>
  <path class="arrow" d="M 660 564 L 660 588"/>
  <path class="arrow" d="M 870 634 C 940 634, 960 310, 1030 310"/>

  <text class="mono" x="430" y="735">bar event -&gt; model engine -&gt; model store/view -&gt; gate engine -&gt; approved alpha -&gt; portfolio/risk/execution</text>
  <text class="note" x="60" y="800">Public repo surface is intentionally limited on private alpha logic, not on runtime architecture.</text>
</svg>
